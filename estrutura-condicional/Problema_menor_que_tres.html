<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menor de Três Números</title>
    <script>
        function menorDeTres() {
            let n1 = parseInt(document.getElementById("n1").value);
            let n2 = parseInt(document.getElementById("n2").value);
            let n3 = parseInt(document.getElementById("n3").value);

            let menor = n1;

            if (n2 < menor) {
                menor = n2;
            }
            if (n3 < menor) {
                menor = n3;
            }

            document.getElementById("resultado").innerText = "O menor número é: " + menor
        }
    </script>
</head>

<body>
    <h1>Encontre o Menor de Três Números</h1>
    <input type="number" id="n1" placeholder="Primeiro número"><br><br>
    <input type="number" id="n2" placeholder="Segundo número"><br><br>
    <input type="number" id="n3" placeholder="Terceiro número"><br><br>
    <button onclick="menorDeTres()">Encontrar Menor</button>
    <p id="resultado"></p>
</body>

</html>
